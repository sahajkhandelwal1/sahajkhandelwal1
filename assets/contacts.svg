<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 230">
  <defs>
    <style>
      .t { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace; font-size: 13px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="230" rx="10" fill="#1a1b27"/>

  <!-- Title bar -->
  <rect width="860" height="36" rx="10" fill="#24283b"/>
  <rect y="26" width="860" height="10" fill="#24283b"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="5.5" fill="#f7768e"/>
  <circle cx="42" cy="18" r="5.5" fill="#ff9e64"/>
  <circle cx="62" cy="18" r="5.5" fill="#9ece6a"/>

  <!-- Title bar label -->
  <text x="430" y="23" class="t" fill="#565f89" text-anchor="middle" font-size="12">contacts — zsh</text>

  <!-- Separator -->
  <line x1="0" y1="36" x2="860" y2="36" stroke="#414868" stroke-width="0.5"/>

  <!-- $ cat contacts.txt -->
  <text x="20" y="76" class="t" xml:space="preserve"><tspan fill="#bb9af7">$</tspan><tspan fill="#7aa2f7"> cat </tspan><tspan fill="#ff9e64">contacts.txt</tspan></text>

  <!-- LinkedIn -->
  <text x="20" y="110" class="t" xml:space="preserve"><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">[+]</tspan><tspan fill="#565f89"> LinkedIn  </tspan><tspan fill="#414868">--&gt;</tspan><tspan fill="#7dcfff"> https://linkedin.com/in/sahajkhandelwal1</tspan></text>

  <!-- GitHub -->
  <text x="20" y="144" class="t" xml:space="preserve"><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">[+]</tspan><tspan fill="#565f89"> GitHub    </tspan><tspan fill="#414868">--&gt;</tspan><tspan fill="#7dcfff"> https://github.com/sahajkhandelwal1</tspan></text>

  <!-- Email -->
  <text x="20" y="178" class="t" xml:space="preserve"><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">[+]</tspan><tspan fill="#565f89"> Email     </tspan><tspan fill="#414868">--&gt;</tspan><tspan fill="#7dcfff"> sahajkhandelwal2@gmail.com</tspan></text>
</svg>
