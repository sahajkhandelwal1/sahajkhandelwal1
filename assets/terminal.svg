  <!-- drwxr-xr-x  frontend/ -->
  <text x="20" y="416" class="t" xml:space="preserve"><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">drwxr-xr-x</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#7dcfff">frontend/</tspan><tspan fill="#c0caf5">    </tspan><tspan fill="#ff9e64">[React, Next.js, TypeScript, TailwindCSS]</tspan></text>

  <!-- drwxr-xr-x  databases/ -->
  <text x="20" y="438" class="t" xml:space="preserve"><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">drwxr-xr-x</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#7dcfff">databases/</tspan><tspan fill="#c0caf5">   </tspan><tspan fill="#ff9e64">[PostgreSQL, MongoDB, Redis]</tspan></text>

  <!-- drwxr-xr-x  devops/ -->
  <text x="20" y="460" class="t" xml:space="preserve"><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">drwxr-xr-x</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#7dcfff">devops/</tspan><tspan fill="#c0caf5">      </tspan><tspan fill="#ff9e64">[Docker, GitHub Actions, AWS, Linux]</tspan></text>

  <!-- drwxr-xr-x  tools/ -->
  <text x="20" y="482" class="t" xml:space="preserve"><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">drwxr-xr-x</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#7dcfff">tools/</tspan><tspan fill="#c0caf5">       </tspan><tspan fill="#ff9e64">[Git, REST APIs, Figma, VS Code]</tspan></text>

  <!-- $ ping linkedin.com -->
  <text x="20" y="526" class="t" xml:space="preserve"><tspan fill="#bb9af7">$</tspan><tspan fill="#7aa2f7"> ping </tspan><tspan fill="#ff9e64">linkedin.com</tspan></text>

  <!-- PING response -->
  <text x="20" y="548" class="t" xml:space="preserve"><tspan fill="#c0caf5">  </tspan><tspan fill="#7dcfff">PING</tspan><tspan fill="#565f89"> linkedin.com &#x2192; </tspan><tspan fill="#9ece6a">linkedin.com/in/sahajkhandelwal1</tspan></text>

  <!-- $ _ blinking cursor -->
  <text x="20" y="592" class="t" xml:space="preserve"><tspan fill="#bb9af7">$</tspan><tspan fill="#c0caf5"> </tspan><tspan fill="#c0caf5" class="blink">&#x2587;</tspan></text>
</svg>
